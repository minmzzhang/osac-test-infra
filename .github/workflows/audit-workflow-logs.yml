---
name: Audit workflow logs

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      lookback-hours:
        description: "Re-scan completed e2e runs created in the last N hours"
        required: false
        default: "25"

concurrency:
  group: audit-workflow-logs
  cancel-in-progress: false

jobs:
  audit:
    # Vault is only reachable at 127.0.0.1 from the osac-ci runners
    # themselves, so this must run there to fetch secrets -- even though the
    # scan itself needs no cluster access.
    runs-on: osac-ci
    permissions:
      contents: read
      # The tracking issue lives in this repo, so issues:write is enough at
      # the job-permissions level for that part. Cross-repo run listing and
      # log fetch/delete use the org-scoped GH_ORG_TOKEN from Vault instead
      # (see "Scan each run's logs" below), not this job's own token.
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      # --- Secret bootstrap (inline — must not run PR-controlled code) ---
      - name: Read AppRole credentials
        id: approle
        run: |
          APPROLE_DIR="${HOME}/.vault-server/.approle"
          echo "role-id=$(cat "${APPROLE_DIR}/role-id")" >> "$GITHUB_OUTPUT"
          echo "::add-mask::$(cat "${APPROLE_DIR}/secret-id")"
          echo "secret-id=$(cat "${APPROLE_DIR}/secret-id")" >> "$GITHUB_OUTPUT"

      - name: Retrieve secrets from Vault
        id: vault
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4
        with:
          url: http://127.0.0.1:8200
          method: approle
          roleId: ${{ steps.approle.outputs.role-id }}
          secretId: ${{ steps.approle.outputs.secret-id }}
          exportEnv: false
          secrets: |
            secret/data/osac/e2e/github-token token | GH_ORG_TOKEN ;
            secret/data/osac/e2e/slack-webhook-url url | SLACK_WEBHOOK_URL

      - name: List recent e2e runs
        id: list
        env:
          GH_TOKEN: ${{ steps.vault.outputs.GH_ORG_TOKEN }}
          LOOKBACK_HOURS: ${{ inputs.lookback-hours || '25' }}
        run: |
          OUTPUT_DIR="${RUNNER_TEMP}/discover"
          .github/scripts/discover-e2e-runs.sh "${LOOKBACK_HOURS}" "${OUTPUT_DIR}"
          # shellcheck disable=SC1091
          source "${OUTPUT_DIR}/status.env"

          echo "runs=$(cat "${OUTPUT_DIR}/runs.json")" >> "$GITHUB_OUTPUT"
          # Listing failures mean we never even knew about some runs, so they
          # can never show up as scan failures below -- tracked separately so
          # a partial audit still can't quietly report as a clean pass.
          echo "skipped-targets=${SKIPPED_TARGETS}" >> "$GITHUB_OUTPUT"

      - name: Scan each run's logs
        id: scan
        env:
          GH_TOKEN: ${{ steps.vault.outputs.GH_ORG_TOKEN }}
          RUNS: ${{ steps.list.outputs.runs }}
        run: |
          AUDIT_DIR="${RUNNER_TEMP}/audit"
          ALL_REDACTED_DIR="${RUNNER_TEMP}/all-redacted"
          SUMMARY_JSONL="${AUDIT_DIR}/summary.jsonl"
          mkdir -p "${AUDIT_DIR}" "${ALL_REDACTED_DIR}"
          : > "${SUMMARY_JSONL}"
          FLAGGED=0
          SKIPPED_SCANS=0

          # Process substitution (not a trailing pipe) so the loop runs in
          # this shell, not a subshell -- otherwise FLAGGED/SKIPPED_SCANS
          # wouldn't survive past the loop.
          while IFS= read -r ITEM; do
            RUN_ID=$(echo "${ITEM}" | jq -r '.run_id')
            REPO=$(echo "${ITEM}" | jq -r '.repo')
            SLUG="${REPO//\//_}-${RUN_ID}"
            echo "::group::Auditing run ${RUN_ID} (${REPO})"
            OUTPUT_DIR="${AUDIT_DIR}/${SLUG}"
            .github/scripts/scan-run-logs.sh "${RUN_ID}" "${OUTPUT_DIR}" "${REPO}"
            # shellcheck disable=SC1091
            source "${OUTPUT_DIR}/status.env"

            if [[ "${SCAN_OK}" != "true" ]]; then
              # Could not even fetch this run's logs -- must not be silently
              # folded into "no leaks found", or an auth/permission problem
              # would look identical to a clean audit.
              SKIPPED_SCANS=$((SKIPPED_SCANS + 1))
            elif [[ "${LEAKS_FOUND}" == "true" ]]; then
              FLAGGED=$((FLAGGED + 1))
              mkdir -p "${ALL_REDACTED_DIR}/${SLUG}"
              cp -r "${OUTPUT_DIR}/redacted/." "${ALL_REDACTED_DIR}/${SLUG}/"
              jq -c --arg run_id "${RUN_ID}" --arg repo "${REPO}" --arg count "${FINDINGS_COUNT}" \
                '{run_id: $run_id, repo: $repo, findings_count: ($count | tonumber), findings: [.[] | {rule: .RuleID, file: .File, line: .StartLine}]}' \
                "${OUTPUT_DIR}/findings.json" >> "${SUMMARY_JSONL}"
            fi
            echo "::endgroup::"
          done < <(echo "${RUNS}" | jq -c '.[]')

          echo "flagged-count=${FLAGGED}" >> "$GITHUB_OUTPUT"
          echo "skipped-scans=${SKIPPED_SCANS}" >> "$GITHUB_OUTPUT"
          echo "SUMMARY_JSONL=${SUMMARY_JSONL}" >> "$GITHUB_ENV"
          echo "ALL_REDACTED_DIR=${ALL_REDACTED_DIR}" >> "$GITHUB_ENV"

      - name: Upload combined redacted logs
        if: steps.scan.outputs.flagged-count != '0'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: audit-redacted-logs-${{ github.run_id }}
          path: ${{ env.ALL_REDACTED_DIR }}
          retention-days: 30

      - name: Write job summary
        if: always()
        id: summary
        env:
          FLAGGED_COUNT: ${{ steps.scan.outputs.flagged-count || '0' }}
          # GitHub Actions expressions have no arithmetic operators, so the
          # two skip counters are added in bash below, not here.
          SKIPPED_TARGETS: ${{ steps.list.outputs.skipped-targets || '0' }}
          SKIPPED_SCANS: ${{ steps.scan.outputs.skipped-scans || '0' }}
          RUN_ID: ${{ github.run_id }}
        run: |
          SKIPPED_TOTAL=$((SKIPPED_TARGETS + SKIPPED_SCANS))
          {
            echo "## Workflow log audit"
            echo ""
            if [[ "${FLAGGED_COUNT}" == "0" ]]; then
              echo "No leaked credentials found in this audit window."
            else
              echo ":rotating_light: **${FLAGGED_COUNT}** run(s) had leaked credential(s) -- see the tracking issue and \`audit-redacted-logs-${RUN_ID}\` artifact."
            fi
            if [[ "${SKIPPED_TOTAL}" != "0" ]]; then
              echo ""
              echo ":warning: **${SKIPPED_TOTAL}** target(s)/run(s) could not be listed or scanned this time (see \`::warning::\` annotations above) -- this audit is partial, not a clean pass."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          echo "skipped-total=${SKIPPED_TOTAL}" >> "$GITHUB_OUTPUT"

          NOTIFY_PARTS=()
          [[ "${FLAGGED_COUNT}" != "0" ]] && NOTIFY_PARTS+=("${FLAGGED_COUNT} run(s) with leaked credential(s)")
          [[ "${SKIPPED_TOTAL}" != "0" ]] && NOTIFY_PARTS+=("${SKIPPED_TOTAL} target(s)/run(s) not scanned (partial audit)")
          # "${arr[*]}" with IFS set only honors the *first* IFS character
          # when joining, so a ", " separator needs an explicit printf join
          # instead.
          NOTIFY_MESSAGE=$(printf ', %s' "${NOTIFY_PARTS[@]}")
          NOTIFY_MESSAGE="${NOTIFY_MESSAGE#, }"
          echo "notify-message=${NOTIFY_MESSAGE}" >> "$GITHUB_OUTPUT"

      - name: Report findings
        if: steps.scan.outputs.flagged-count != '0'
        env:
          # This repo's own token is enough here: the tracking issue is
          # always created/updated in this repo, regardless of which repo
          # a flagged run came from (unlike run listing/log fetch above,
          # which need the org-scoped token to reach other repos).
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FLAGGED_COUNT: ${{ steps.scan.outputs.flagged-count }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ARTIFACT_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts
        run: |
          echo "::group::Build findings body"
          BODY_FILE="${RUNNER_TEMP}/issue-body.md"
          {
            echo "Automated audit found leaked credential(s) in **${FLAGGED_COUNT}** e2e workflow run(s)."
            echo ""
            echo "Raw logs for each affected run have been deleted; a redacted copy of each is in the"
            echo "[\`audit-redacted-logs-${RUN_ID}\`](${ARTIFACT_URL}) artifact from [this audit run](${RUN_URL})."
            echo ""
            echo "| Repo | Run | Findings | Rule(s) |"
            echo "|---|---|---|---|"
            jq -r '"| \(.repo) | [\(.run_id)](https://github.com/\(.repo)/actions/runs/\(.run_id)) | \(.findings_count) | " + ([.findings[].rule] | unique | join(", ")) + " |"' "${SUMMARY_JSONL}"
            echo ""
            echo "Rotate any credential(s) above that are real (not test/dev-only values)."
          } > "${BODY_FILE}"
          echo "::endgroup::"

          echo "::group::Create or update tracking issue"
          EXISTING=$(curl -sL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/issues?state=open&labels=credential-leak&per_page=1")
          ISSUE_NUMBER=$(echo "${EXISTING}" | jq -r '.[0].number // empty')

          # --fail-with-body: without it, curl exits 0 (and this step "succeeds")
          # even on a 4xx/5xx response, so a permission/label/validation problem
          # would silently skip incident reporting entirely.
          if [[ -n "${ISSUE_NUMBER}" ]]; then
            echo "Appending to existing issue #${ISSUE_NUMBER}."
            curl -sL --fail-with-body -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}/comments" \
              -d "$(jq -n --rawfile body "${BODY_FILE}" '{body: $body}')"
          else
            echo "Creating new tracking issue."
            curl -sL --fail-with-body -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/issues" \
              -d "$(jq -n --rawfile body "${BODY_FILE}" \
                '{title: "OSAC-1684: Leaked credentials detected in e2e workflow logs", body: $body, labels: ["credential-leak"]}')"
          fi
          echo "::endgroup::"

      - name: Notify Slack
        # always(): a bare boolean condition implicitly ANDs with success(),
        # so without this, a hard failure in "Scan each run's logs" itself
        # (not just a tracked SCAN_OK=false) would skip this notification --
        # exactly the failure most worth alerting on. steps.scan.outcome is
        # checked explicitly too, since a hard failure there could in
        # principle leave flagged-count/skipped-total unset rather than '0'.
        if: >
          always() &&
          (steps.scan.outcome == 'failure' || steps.scan.outputs.flagged-count != '0' || steps.summary.outputs.skipped-total != '0')
        uses: ./.github/actions/notify-slack
        with:
          status: failure
          workflow-name: "Workflow log audit"
          failed-step: "${{ steps.scan.outcome == 'failure' && 'Scan step failed unexpectedly -- see run logs' || steps.summary.outputs.notify-message || 'Audit incomplete -- see run logs' }}"
          slack-webhook-url: ${{ steps.vault.outputs.SLACK_WEBHOOK_URL }}
          workflow-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          branch-name: ${{ github.ref_name }}
          commit-sha: ${{ github.sha }}
          artifact-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts
