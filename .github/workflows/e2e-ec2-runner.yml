---
name: E2E EC2 Ephemeral Runner

on:
  workflow_call:
    inputs:
      instance-type:
        description: "EC2 instance type"
        required: false
        type: string
        default: "c5n.metal"
      aws-region:
        description: "AWS region to launch into"
        required: false
        type: string
        default: "us-east-1"
      orchestrator-runner-label:
        description: "Self-hosted runner label for the orchestrator (dedicated, not the shared osac-ci fleet, so it's never queued behind existing e2e jobs)"
        required: false
        type: string
        default: "osac-ci-orchestrator"
      # The default installs real packages/network access (dnf + pip), unlike
      # the old "command -v podman" placeholder which could never fail on
      # network flakiness. Each semicolon-separated item runs as its own SSH
      # call with no retry -- v1 accepts that a transient mirror/PyPI hiccup
      # hard-fails verification (skipping JIT registration, same cost as any
      # other tooling-check failure), matching this repo's existing
      # accept-and-revisit-if-flaky precedent (see provision.sh's
      # InsufficientInstanceCapacity handling for the same philosophy).
      tooling-check-cmds:
        description: "Semicolon-separated commands to run/verify on the box before JIT registration. Defaults to installing and verifying the CaaS/Netris flow's prerequisites (ansible-core, python3-pip, make -- matching what the equivalent Prow lab-setup step installed, and infra/netris/README.md's own documented setup), since that's what this workflow is being built to serve -- the test job itself doesn't consume these yet (still a placeholder), a later PR adds the real steps that do."
        required: false
        type: string
        default: "dnf install -y ansible-core python3-pip make; pip3 install ansible; command -v ansible-playbook; command -v make"
      osac-installer-image:
        description: "Override osac-installer image (registry-pullable reference, e.g. from a component repo's own PR build) -- accepted but not yet consumed: infra/netris has no plain extra-var for this (see the test job's 'Build component image overrides' step comment), needs podman-extraction handling in a later PR"
        required: false
        type: string
        default: ""
      osac-operator-image:
        description: "Override osac-operator image (registry-pullable reference) -- empty means no override"
        required: false
        type: string
        default: ""
      fulfillment-service-image:
        description: "Override fulfillment-service image (registry-pullable reference) -- empty means no override"
        required: false
        type: string
        default: ""
      osac-aap-ee-image:
        description: "Override osac-aap execution-environment image (registry-pullable reference) -- empty means no override"
        required: false
        type: string
        default: ""
    outputs:
      result:
        description: "Overall result: PASSED or FAILED"
        value: ${{ jobs.test.outputs.result }}

jobs:
  provision:
    runs-on: ${{ inputs.orchestrator-runner-label }}
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      # Run-specific, not the orchestrator's shared ~/.ssh/known_hosts --
      # see provision.sh's header for why (recycled EC2 IPs can carry a
      # stale cached host key in a shared file). Deterministically derived
      # here (rather than passed as a job output) so the teardown job,
      # which needs the identical path to clean it up, can compute the same
      # value independently.
      KNOWN_HOSTS_FILE: /tmp/osac-ec2-known-hosts-${{ github.run_id }}-${{ github.run_attempt }}
    outputs:
      instance-id: ${{ steps.provision.outputs.instance-id }}
      public-ip: ${{ steps.provision.outputs.public-ip }}
      ssh-user: ${{ steps.provision.outputs.ssh-user }}
      runner-label: ${{ steps.register.outputs.runner-label }}
      runner-id: ${{ steps.register.outputs.runner-id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Validate and bootstrap
        id: setup
        uses: ./.github/actions/validate-and-bootstrap
        with:
          test-suite: ec2-runner
          run-id: ${{ github.run_id }}

      - name: Fetch EC2 runner AWS credentials
        id: aws-creds
        uses: ./.github/actions/fetch-ec2-runner-aws-creds
        with:
          role-id: ${{ steps.setup.outputs.role-id }}
          secret-id: ${{ steps.setup.outputs.secret-id }}

      - name: Fetch EC2 runner GitHub PAT
        id: gh-pat
        uses: ./.github/actions/fetch-ec2-runner-github-pat
        with:
          role-id: ${{ steps.setup.outputs.role-id }}
          secret-id: ${{ steps.setup.outputs.secret-id }}

      - name: Fetch EC2 runner network config
        id: network-config
        uses: ./.github/actions/fetch-ec2-runner-network-config
        with:
          role-id: ${{ steps.setup.outputs.role-id }}
          secret-id: ${{ steps.setup.outputs.secret-id }}

      - name: Verify orchestrator SSH keypair exists
        shell: bash
        run: |
          if [ ! -f "${HOME}/.ssh/osac_ec2_orchestrator" ] || [ ! -f "${HOME}/.ssh/osac_ec2_orchestrator.pub" ]; then
            echo "::error::Orchestrator SSH keypair not found at ~/.ssh/osac_ec2_orchestrator{,.pub}."
            echo "This is a static, non-rotating keypair generated once during orchestrator"
            echo "runner setup (see docs/new-ci-machine-setup.md), not per-run -- it must"
            echo "already exist on this machine."
            exit 1
          fi

      - name: Provision ephemeral EC2 instance
        id: provision
        shell: bash
        env:
          AMI_ID: ${{ steps.network-config.outputs.AMI_ID }}
          INSTANCE_TYPE: ${{ inputs.instance-type }}
          SUBNET_ID: ${{ steps.network-config.outputs.SUBNET_ID }}
          SECURITY_GROUP_ID: ${{ steps.network-config.outputs.SECURITY_GROUP_ID }}
          # run_attempt (not just run_id) so a re-run after a failed teardown
          # never collides with a still-registered runner/instance from the
          # previous attempt.
          RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          AWS_ACCESS_KEY_ID: ${{ steps.aws-creds.outputs.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.aws-creds.outputs.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ inputs.aws-region }}
        run: |
          export ORCHESTRATOR_PUBKEY_PATH="${HOME}/.ssh/osac_ec2_orchestrator.pub"
          export SSH_KEY_PATH="${HOME}/.ssh/osac_ec2_orchestrator"
          ./scripts/ec2-runner/provision.sh

      - name: Verify tooling and register JIT runner
        id: register
        shell: bash
        env:
          SSH_USER: ${{ steps.provision.outputs.ssh-user }}
          PUBLIC_IP: ${{ steps.provision.outputs.public-ip }}
          RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          GH_TOKEN: ${{ steps.gh-pat.outputs.GH_TOKEN }}
          TOOLING_CHECK_CMDS: ${{ inputs.tooling-check-cmds }}
        run: |
          export SSH_KEY_PATH="${HOME}/.ssh/osac_ec2_orchestrator"
          ./scripts/ec2-runner/verify-and-register.sh

      - name: Install and start runner
        shell: bash
        env:
          SSH_USER: ${{ steps.provision.outputs.ssh-user }}
          PUBLIC_IP: ${{ steps.provision.outputs.public-ip }}
          JIT_CONFIG: ${{ steps.register.outputs.jit-config }}
        run: |
          export SSH_KEY_PATH="${HOME}/.ssh/osac_ec2_orchestrator"
          ./scripts/ec2-runner/start-runner.sh

  test:
    needs: provision
    # 360m (6h): the placeholder's 30m was fine for an echo statement, but
    # the real CaaS/Netris flow's own Prow step timeouts summed to
    # lab-setup(30m)+lab-deploy(90m)+lab-snapshot(3h)+caas-setup(45m)+
    # caas-deploy(90m) -- several hours in the worst case. Self-hosted
    # runners aren't bound by GitHub-hosted runners' 6h job cap, so this is
    # just an explicit upper bound, not a platform limit.
    runs-on: ${{ needs.provision.outputs.runner-label }}
    timeout-minutes: 360
    permissions:
      contents: read
    outputs:
      result: ${{ steps.run-tests.outcome == 'success' && 'PASSED' || 'FAILED' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      # SECURITY: EXTRA_VARS ends up passed as EXTRA_VARS='$(EXTRA_VARS)' on
      # a recipe line through several layers of make (root Makefile ->
      # infra/netris/contract.mk -> infra/netris/Makefile) before reaching
      # ansible-playbook. GNU Make recursively re-expands $(...) sequences
      # every time a variable is dereferenced -- verified empirically that
      # an image-override value containing e.g. $(shell <cmd>) gets executed
      # for real by make itself during that expansion, independent of any
      # shell-quoting concerns, giving anyone with write access to dispatch
      # this workflow root code execution on the ephemeral box (with access
      # to every secret staged there: pull secret, AAP/Netris licenses,
      # Route53 AWS creds). Real container image references never contain
      # anything outside this character set, so validate-and-reject instead
      # of trying to escape -- escaping doesn't cleanly survive an unknown
      # number of make-expansion layers (verified: a single $ -> $$ escape
      # is consumed by the first layer and unprotected by the second). Runs
      # first, before any Vault secret fetch, so a bad input fails fast.
      - name: Validate component image override inputs
        shell: bash
        env:
          OSAC_INSTALLER_IMAGE: ${{ inputs.osac-installer-image }}
          OSAC_OPERATOR_IMAGE: ${{ inputs.osac-operator-image }}
          FULFILLMENT_SERVICE_IMAGE: ${{ inputs.fulfillment-service-image }}
          OSAC_AAP_EE_IMAGE: ${{ inputs.osac-aap-ee-image }}
        run: |
          for name in OSAC_INSTALLER_IMAGE OSAC_OPERATOR_IMAGE FULFILLMENT_SERVICE_IMAGE OSAC_AAP_EE_IMAGE; do
            value="${!name}"
            if [[ -n "$value" ]] && [[ ! "$value" =~ ^[A-Za-z0-9._/:@-]+$ ]]; then
              echo "::error::${name} contains characters outside a valid image reference (letters, digits, and ._/:@- only): ${value}"
              exit 1
            fi
          done

      - name: Validate and bootstrap
        id: setup
        uses: ./.github/actions/validate-and-bootstrap
        with:
          test-suite: ec2-runner
          run-id: ${{ github.run_id }}

      - name: Fetch E2E secrets (pull-secret, AAP license, snapshot registry)
        id: e2e-secrets
        uses: ./.github/actions/fetch-and-write-secrets
        with:
          role-id: ${{ steps.setup.outputs.role-id }}
          secret-id: ${{ steps.setup.outputs.secret-id }}

      - name: Fetch Netris license
        id: netris-license
        uses: ./.github/actions/fetch-netris-license
        with:
          role-id: ${{ steps.setup.outputs.role-id }}
          secret-id: ${{ steps.setup.outputs.secret-id }}

      - name: Fetch CaaS Route 53 credentials
        id: route53-creds
        uses: ./.github/actions/fetch-caas-route53-creds
        with:
          role-id: ${{ steps.setup.outputs.role-id }}
          secret-id: ${{ steps.setup.outputs.secret-id }}

      # Unlike Prow's netris-caas job (which always gets fresh, ci-operator
      # -resolved image references for all four of these via its
      # `dependencies:` mechanism), these are optional overrides here --
      # there's no equivalent automatic build/resolution graph in GitHub
      # Actions, so a component repo's own CI is responsible for having
      # already built and pushed an image before passing its reference in.
      # Empty means "no override", not "override with an empty value" --
      # only non-empty inputs are included, letting infra/netris's own
      # Makefile/ansible defaults apply otherwise.
      #
      # osac-installer-image is deliberately NOT included in this JSON:
      # infra/netris has no osac_installer_image ansible var (only
      # osac_installer_repo/osac_installer_branch/osac_installer_dir --
      # confirmed by reading infra/netris/inventory/group_vars/all.yml and
      # roles/osac_install/tasks/main.yml). Prow's own handling of this
      # exact input wasn't a simple extra-var either -- it podman-pulled the
      # image, extracted the installer binary via `podman create`+`cp`, and
      # set osac_installer_skip_clone: true so ansible wouldn't re-clone it.
      # That extraction logic belongs in the real deploy step (a later PR in
      # this series), not this plumbing-only step -- passing it through
      # naively here would silently no-op since ansible ignores unknown
      # extra-vars.
      - name: Build component image overrides
        id: extra-vars
        shell: bash
        env:
          OSAC_OPERATOR_IMAGE: ${{ inputs.osac-operator-image }}
          FULFILLMENT_SERVICE_IMAGE: ${{ inputs.fulfillment-service-image }}
          OSAC_AAP_EE_IMAGE: ${{ inputs.osac-aap-ee-image }}
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo dnf install -y jq
          fi
          EXTRA_VARS="{}"
          declare -A OVERRIDES=(
            [osac_operator_image]="$OSAC_OPERATOR_IMAGE"
            [fulfillment_service_image]="$FULFILLMENT_SERVICE_IMAGE"
            [osac_aap_image]="$OSAC_AAP_EE_IMAGE"
          )
          for key in "${!OVERRIDES[@]}"; do
            value="${OVERRIDES[$key]}"
            if [ -n "$value" ]; then
              EXTRA_VARS=$(echo "$EXTRA_VARS" | jq -c --arg k "$key" --arg v "$value" '. + {($k): $v}')
              echo "Component image override: ${key}=${value}"
            fi
          done
          echo "json=${EXTRA_VARS}" >> "$GITHUB_OUTPUT"

      - name: Log unconsumed osac-installer-image input
        shell: bash
        env:
          OSAC_INSTALLER_IMAGE: ${{ inputs.osac-installer-image }}
        run: |
          if [ -n "${OSAC_INSTALLER_IMAGE}" ]; then
            echo "osac-installer-image was set (${OSAC_INSTALLER_IMAGE}) but is not consumed yet -- see the 'Build component image overrides' step's comment."
          fi

      # Must run before make setup-infra: infra/netris's own deploy steps
      # need the pull secret and licenses already in place (mirrors Prow's
      # lab-setup step, which copied these early too, not lazily at deploy
      # time).
      - name: Write CaaS/Netris secrets and config
        shell: bash
        env:
          NETRIS_DIR: infra/netris
          NETRIS_LICENSE: ${{ steps.netris-license.outputs.NETRIS_LICENSE }}
          ROUTE53_AWS_ACCESS_KEY_ID: ${{ steps.route53-creds.outputs.ROUTE53_AWS_ACCESS_KEY_ID }}
          ROUTE53_AWS_SECRET_ACCESS_KEY: ${{ steps.route53-creds.outputs.ROUTE53_AWS_SECRET_ACCESS_KEY }}
          AAP_LICENSE_ZIP_PATH: ${{ runner.temp }}/aap-license.zip
          PULL_SECRET_JSON_PATH: ${{ runner.temp }}/pull-secret.json
          LAB_NAME: ci-${{ github.run_id }}
          AWS_REGION: ${{ inputs.aws-region }}
        run: ./scripts/ec2-runner/write-caas-netris-config.sh

      # Each stage is a separate step (rather than one `make e2e` call) for
      # per-stage visibility/timing in the Actions UI, mirroring Prow's own
      # per-step granularity (lab-setup/lab-deploy/lab-snapshot/caas-setup
      # were all separate Prow steps too). make e2e INFRA=netris SUITE=caas
      # is the equivalent single-command form if that granularity is ever
      # not wanted.
      - name: Setup infra prerequisites (make setup-infra)
        shell: bash
        env:
          EXTRA_VARS: ${{ steps.extra-vars.outputs.json }}
        run: make setup-infra INFRA=netris SUITE=caas EXTRA_VARS="${EXTRA_VARS}"

      - name: Deploy Netris lab (make deploy-infra)
        shell: bash
        env:
          EXTRA_VARS: ${{ steps.extra-vars.outputs.json }}
        run: make deploy-infra INFRA=netris SUITE=caas EXTRA_VARS="${EXTRA_VARS}"

      - name: Deploy OSAC from snapshot (make deploy-osac)
        shell: bash
        env:
          EXTRA_VARS: ${{ steps.extra-vars.outputs.json }}
        run: make deploy-osac INFRA=netris SUITE=caas EXTRA_VARS="${EXTRA_VARS}"

      - name: Setup CaaS suite (make setup-suite)
        shell: bash
        env:
          EXTRA_VARS: ${{ steps.extra-vars.outputs.json }}
        run: make setup-suite INFRA=netris SUITE=caas EXTRA_VARS="${EXTRA_VARS}"

      # The actual test: tests/caas/test_cluster_create.py creates a cluster
      # via the osac CLI, waits for it to become Ready, deletes it, and
      # verifies removal -- functionally the same thing Prow's separate
      # deploy-caas/gather-caas shell steps did, but already implemented
      # here as a real pytest test rather than something to re-port.
      - name: Run CaaS e2e tests (make run-tests)
        id: run-tests
        shell: bash
        run: make run-tests INFRA=netris SUITE=caas

      # Two separate steps, each independently best-effort (rather than one
      # script with both commands): GH Actions' default bash shell runs with
      # -e, so if the first command failed inside a single multi-line step,
      # the second would never even attempt to run despite
      # continue-on-error -- that only stops a step's failure from failing
      # the job, it doesn't help a step's own script recover mid-script.
      - name: Gather infra diagnostics
        if: always()
        shell: bash
        continue-on-error: true
        run: make gather-infra INFRA=netris

      - name: Gather CaaS diagnostics
        if: always()
        shell: bash
        continue-on-error: true
        run: make gather-suite INFRA=netris SUITE=caas

      - name: Upload CaaS/Netris test artifacts
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: caas-netris-artifacts
          path: |
            reports/caas.xml
            infra/netris/logs/
          if-no-files-found: ignore

      # Not part of the formal backend contract (infra/contract.md's target
      # list doesn't include it), so called directly against contract.mk
      # rather than through a root Makefile wrapper -- see this PR's
      # description for why a generic root-level wrapper would be
      # misleading for a netris-specific extra.
      - name: Cleanup Route 53 DNS records
        if: always()
        shell: bash
        continue-on-error: true
        run: make -C infra/netris -f contract.mk cleanup-dns

      - name: Gather EC2 runner artifacts
        if: always()
        uses: ./.github/actions/gather-ec2-runner-artifacts

  teardown:
    needs: [provision, test]
    if: always()
    runs-on: ${{ inputs.orchestrator-runner-label }}
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      # Must match the provision job's derivation exactly -- see that job's
      # env block for why this is computed independently rather than passed
      # as an output.
      KNOWN_HOSTS_FILE: /tmp/osac-ec2-known-hosts-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      # Every step below is if: always(): the job-level if: always() only
      # guarantees this job STARTS regardless of provision/test outcome, it
      # does not make a later step run if an earlier step in this job fails.
      # Without this, a transient Vault hiccup while fetching credentials
      # here would skip the "Teardown" step itself, leaving a real, billed
      # instance running with no automated path to terminate it.
      - name: Checkout repository
        if: always()
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Validate and bootstrap
        if: always()
        id: setup
        uses: ./.github/actions/validate-and-bootstrap
        with:
          test-suite: ec2-runner
          run-id: ${{ github.run_id }}

      - name: Fetch EC2 runner AWS credentials
        if: always()
        id: aws-creds
        uses: ./.github/actions/fetch-ec2-runner-aws-creds
        with:
          role-id: ${{ steps.setup.outputs.role-id }}
          secret-id: ${{ steps.setup.outputs.secret-id }}

      - name: Fetch EC2 runner GitHub PAT
        if: always()
        id: gh-pat
        uses: ./.github/actions/fetch-ec2-runner-github-pat
        with:
          role-id: ${{ steps.setup.outputs.role-id }}
          secret-id: ${{ steps.setup.outputs.secret-id }}

      - name: Teardown
        if: always()
        shell: bash
        env:
          INSTANCE_ID: ${{ needs.provision.outputs.instance-id }}
          RUNNER_ID: ${{ needs.provision.outputs.runner-id }}
          GH_TOKEN: ${{ steps.gh-pat.outputs.GH_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ steps.aws-creds.outputs.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.aws-creds.outputs.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ inputs.aws-region }}
        run: ./scripts/ec2-runner/teardown.sh
