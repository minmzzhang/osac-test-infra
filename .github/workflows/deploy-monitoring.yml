---
name: Deploy monitoring stack

# On merge to main (or manual re-run), refreshes the live stack on osac-ci-1
# and fans out to every registered remote runner. Runs on the dedicated
# monitoring-central self-hosted runner (OSAC-2204) -- must be osac-ci-1
# itself, since monitoring-setup.sh --update-central operates on the local
# filesystem/systemd/podman there directly.
#
# Deliberately has NO pull_request trigger (see validate-monitoring.yml for
# the PR-time checks) -- GitHub Actions triggers are per-file, so keeping
# this in its own file means it never appears, even as "skipped", in a PR's
# checks list. It's only ever visible under the repo's Actions tab.
on:
  push:
    branches: [main]
    paths: ["monitoring/**"]
  workflow_dispatch: {}

jobs:
  deploy:
    # workflow_dispatch lets the caller pick any branch/tag to run against --
    # without the explicit ref check, a manual dispatch against an unmerged
    # branch would still deploy straight to production.
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: monitoring-central
    permissions:
      contents: read
    concurrency:
      group: deploy-monitoring
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      # --- Secret bootstrap (same pattern as e2e-vmaas.yml) ---
      - name: Read AppRole credentials
        id: approle
        run: |
          APPROLE_DIR="${HOME}/.vault-server/.approle"
          echo "role-id=$(cat "${APPROLE_DIR}/role-id")" >> "$GITHUB_OUTPUT"
          echo "::add-mask::$(cat "${APPROLE_DIR}/secret-id")"
          echo "secret-id=$(cat "${APPROLE_DIR}/secret-id")" >> "$GITHUB_OUTPUT"

      - name: Retrieve secrets from Vault
        id: vault
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4
        with:
          url: http://127.0.0.1:8200
          method: approle
          roleId: ${{ steps.approle.outputs.role-id }}
          secretId: ${{ steps.approle.outputs.secret-id }}
          exportEnv: false
          secrets: |
            secret/data/osac/monitoring/github-token token | PRIVATE_GITHUB_TOKEN ;
            secret/data/osac/monitoring/slack-webhook-url url | SLACK_WEBHOOK_URL ;
            secret/data/osac/monitoring/grafana-oauth client_id | GF_OAUTH_CLIENT_ID ;
            secret/data/osac/monitoring/grafana-oauth client_secret | GF_OAUTH_CLIENT_SECRET ;
            secret/data/osac/monitoring/grafana-oauth root_url | GF_ROOT_URL ;
            secret/data/osac/monitoring/grafana-oauth admin_password | GF_ADMIN_PASSWORD

      - name: Write .env files
        env:
          PRIVATE_GITHUB_TOKEN: ${{ steps.vault.outputs.PRIVATE_GITHUB_TOKEN }}
          GF_OAUTH_CLIENT_ID: ${{ steps.vault.outputs.GF_OAUTH_CLIENT_ID }}
          GF_OAUTH_CLIENT_SECRET: ${{ steps.vault.outputs.GF_OAUTH_CLIENT_SECRET }}
          GF_ROOT_URL: ${{ steps.vault.outputs.GF_ROOT_URL }}
          GF_ADMIN_PASSWORD: ${{ steps.vault.outputs.GF_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail
          # Idempotent: updates a key in place if the file already has other
          # variables, appends otherwise -- never clobbers the rest of the file.
          set_var() {
            local file="$1" key="$2" value="$3"
            touch "${file}"
            if grep -q "^${key}=" "${file}"; then
              sed -i "s|^${key}=.*|${key}=${value}|" "${file}"
            else
              echo "${key}=${value}" >> "${file}"
            fi
            chmod 600 "${file}"
          }

          MONITORING_HOME="${HOME}/.monitoring-server"
          mkdir -p "${MONITORING_HOME}"
          set_var "${MONITORING_HOME}/.env" PRIVATE_GITHUB_TOKEN "${PRIVATE_GITHUB_TOKEN}"
          set_var "${MONITORING_HOME}/.env.grafana" GF_AUTH_GITHUB_CLIENT_ID "${GF_OAUTH_CLIENT_ID}"
          set_var "${MONITORING_HOME}/.env.grafana" GF_AUTH_GITHUB_CLIENT_SECRET "${GF_OAUTH_CLIENT_SECRET}"
          set_var "${MONITORING_HOME}/.env.grafana" GF_SERVER_ROOT_URL "${GF_ROOT_URL}"
          # Only takes effect on Grafana's first-ever boot (seeds the
          # initial admin user) -- harmless to keep in sync on every
          # deploy regardless, in case of a future re-provision.
          set_var "${MONITORING_HOME}/.env.grafana" GF_SECURITY_ADMIN_PASSWORD "${GF_ADMIN_PASSWORD}"

      - name: Update central stack
        env:
          SLACK_WEBHOOK_URL: ${{ steps.vault.outputs.SLACK_WEBHOOK_URL }}
        run: bash monitoring/scripts/monitoring-setup.sh --update-central

      - name: Update remote agents
        run: |
          set -uo pipefail
          REGISTRY="${HOME}/.monitoring-server/config/remote-runners.txt"
          KEY="${HOME}/.monitoring-server/.ssh/monitoring_ed25519"
          SYNC_DIR="${HOME}/.monitoring-server-repo-sync"
          KNOWN_HOSTS="${HOME}/.monitoring-server/.ssh/known_hosts"

          if [[ ! -s "${REGISTRY}" ]]; then
            echo "No remote runners registered -- nothing to fan out to."
            exit 0
          fi

          # Build the monitoring-scoped known_hosts from already-pinned
          # entries in the default ~/.ssh/known_hosts -- NOT from a live
          # ssh-keyscan, which would blindly trust whatever key the host
          # (or a MITM) presents right now with no prior verification.
          # ssh-keygen -F only emits an entry that's already trusted, so
          # this step introduces no new trust decision; it just fails
          # loudly if a registered host has no pinned key to reuse.
          DEFAULT_KNOWN_HOSTS="${HOME}/.ssh/known_hosts"
          mkdir -p "$(dirname "${KNOWN_HOSTS}")"
          : > "${KNOWN_HOSTS}.tmp"
          MISSING_HOSTS=()
          while read -r label host _port; do
            [[ -z "${label}" ]] && continue
            if ! ssh-keygen -F "${host}" -f "${DEFAULT_KNOWN_HOSTS}" >> "${KNOWN_HOSTS}.tmp" 2>/dev/null; then
              MISSING_HOSTS+=("${label} (${host})")
            fi
          done < "${REGISTRY}"

          if [[ ${#MISSING_HOSTS[@]} -gt 0 ]]; then
            echo "ERROR: no pinned host key in ${DEFAULT_KNOWN_HOSTS} for: ${MISSING_HOSTS[*]}" >&2
            echo "Verify the host key out-of-band, then add it manually before re-running." >&2
            exit 1
          fi
          mv "${KNOWN_HOSTS}.tmp" "${KNOWN_HOSTS}"

          SSH_OPTS=(-i "${KEY}" -o StrictHostKeyChecking=yes -o "UserKnownHostsFile=${KNOWN_HOSTS}" -o ConnectTimeout=10)
          FAILED_HOSTS=()

          # Best-effort per host: one unreachable/flaky runner shouldn't
          # block updating the other six. Failures are collected and the
          # step still exits non-zero at the end so CI surfaces the problem.
          while read -r label host _port; do
            [[ -z "${label}" ]] && continue
            echo "=== Updating ${label} (${host}) ==="

            if ! rsync -az --delete -e "ssh ${SSH_OPTS[*]}" \
                 monitoring/ "github-runner@${host}:${SYNC_DIR}/monitoring/"; then
              echo "ERROR: rsync to ${label} (${host}) failed"
              FAILED_HOSTS+=("${label}")
              continue
            fi

            if ! ssh "${SSH_OPTS[@]}" "github-runner@${host}" \
                 "MONITORING_REPO_DIR=${SYNC_DIR}/monitoring bash ${SYNC_DIR}/monitoring/scripts/monitoring-setup.sh --update-agent"; then
              echo "ERROR: --update-agent on ${label} (${host}) failed"
              FAILED_HOSTS+=("${label}")
              continue
            fi
          done < "${REGISTRY}"

          if [[ ${#FAILED_HOSTS[@]} -gt 0 ]]; then
            echo "Failed to update: ${FAILED_HOSTS[*]}"
            exit 1
          fi

      - name: Post-deploy health check
        run: |
          set -uo pipefail
          # A few retries with a scrape-interval-sized gap: node-exporter on
          # the most-recently-updated remote host may not have been
          # re-scraped by Prometheus yet (scrape_interval: 15s) by the time
          # this step starts, which would otherwise spuriously fail a
          # perfectly healthy deploy.
          for attempt in 1 2 3; do
            if bash monitoring/scripts/monitoring-health-check.sh; then
              exit 0
            fi
            echo "Health check attempt ${attempt} failed, waiting for the next Prometheus scrape cycle..."
            sleep 20
          done
          echo "Health check failed after 3 attempts."
          exit 1
