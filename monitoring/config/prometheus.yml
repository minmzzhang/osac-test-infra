# Prometheus configuration for OSAC CI runner monitoring
# Deployed by monitoring-setup.sh to ~/.monitoring-server/config/prometheus.yml
#
# Prometheus runs with --network=host so it can scrape localhost-bound
# exporters directly. All targets use 127.0.0.1.
# Remote runners are reached via SSH tunnels that bind to 127.0.0.1
# on unique local ports.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# Alert rules
rule_files:
  - /etc/prometheus/alert-rules.yml

# Alertmanager endpoint (localhost, same machine)
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 127.0.0.1:9093

scrape_configs:
  # ---------------------------------------------------------------------------
  # Central machine exporters
  # ---------------------------------------------------------------------------

  - job_name: node-exporter
    static_configs:
      - targets:
          - 127.0.0.1:9100
        labels:
          instance: central
          role: central

  # runner-exporter disabled -- no published container image available yet.
  # Re-enable when a containerized per-runner exporter is available.
  # - job_name: runner-exporter
  #   static_configs:
  #     - targets:
  #         - 127.0.0.1:9101
  #       labels:
  #         instance: central
  #         role: central

  - job_name: org-runner-exporter
    scrape_interval: 30s
    static_configs:
      - targets:
          - 127.0.0.1:9102
        labels:
          instance: central

  # Prometheus self-monitoring (port 9091; cockpit uses 9090)
  - job_name: prometheus
    static_configs:
      - targets:
          - 127.0.0.1:9091

  # ---------------------------------------------------------------------------
  # Remote runner exporters (via SSH tunnels)
  #
  # Each remote runner's node_exporter is forwarded to a unique local port via
  # an SSH tunnel (monitoring-tunnel@<host>--<port>.service). The block below
  # is auto-generated by monitoring-setup.sh --add-tunnel / --remove-tunnel
  # from the registry at ${MONITORING_HOME}/config/remote-runners.txt.
  # Do NOT hand-edit between the BEGIN/END markers -- the next --add-tunnel
  # or --remove-tunnel run overwrites it.
  #
  # To add a new runner:
  #   1. Deploy monitoring-setup.sh --agent on the runner
  #   2. From the central machine: monitoring-setup.sh --add-tunnel <host> <base_port>
  #      (starts the tunnel, updates this block, and reloads Prometheus)
  #
  # To remove a runner: monitoring-setup.sh --remove-tunnel <host>
  # ---------------------------------------------------------------------------
  # BEGIN REMOTE TARGETS
  # END REMOTE TARGETS

  # runner-exporter-remote disabled -- no published container image available yet.
  # - job_name: runner-exporter-remote
  #   static_configs:
  #     - targets:
  #         - 127.0.0.1:9111
  #       labels:
  #         instance: runner-1
  #         role: agent

  # ---------------------------------------------------------------------------
  # Workflow exporter (GitHub Actions job queue + history)
  # ---------------------------------------------------------------------------

  - job_name: workflow-exporter
    scrape_interval: 90s
    static_configs:
      - targets:
          - 127.0.0.1:9103
        labels:
          instance: central
