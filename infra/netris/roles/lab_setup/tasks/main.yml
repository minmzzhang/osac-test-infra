---
- name: Load netris-lab variables
  ansible.builtin.include_vars:
    file: "{{ netris_lab_dir }}/group_vars/all.yml"

- name: Pre-flight checks
  ansible.builtin.include_tasks: "{{ role_path }}/../lab_deploy/tasks/preflight.yml"

- name: Install Ansible collections
  ansible.builtin.command:
    cmd: ansible-galaxy collection install -r requirements.yml -p collections
    chdir: "{{ netris_lab_dir }}"
  changed_when: false

- name: Run prerequisites
  ansible.builtin.include_role:
    name: prerequisites

- name: Cache container and cloud images
  ansible.builtin.include_role:
    name: cache

- name: Install OCP and OSAC dependencies
  ansible.builtin.dnf:
    name:
      - podman
      - dnsmasq
      - zstd
      - pigz
    state: present

- name: Install aicli and awscli
  ansible.builtin.pip:
    name:
      - aicli
      - awscli
    state: present

- name: Install oc CLI
  ansible.builtin.shell:
    cmd: |
      curl -fsSL https://mirror.openshift.com/pub/openshift-v4/x86_64/clients/ocp/stable/openshift-client-linux.tar.gz \
        | tar xzf - -C /usr/local/bin oc kubectl
    creates: /usr/local/bin/oc

- name: Install helm
  ansible.builtin.command:
    cmd: bash -c "curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash"
    creates: /usr/local/bin/helm

- name: Install Go toolchain
  ansible.builtin.shell:
    cmd: |
      curl -fsSL https://go.dev/dl/go1.24.4.linux-amd64.tar.gz \
        | tar xzf - -C /usr/local
    creates: /usr/local/go/bin/go

# Job-scoped, non-root checkout: this role only ever runs on a freshly
# provisioned, single-job EC2 instance (e2e-caas-netris.yml's "test" job),
# so there's no actual concurrent-job interference on /opt today -- but
# root-owning the source tree contradicts the rest of this change (job-
# scoped, non-root osac tooling), and a non-root build step reading from a
# root-owned checkout is an assumption, not something to keep relying on.
#
# lookup('env', 'HOME'), not ansible_env.HOME: this play sets gather_facts:
# true + become: true, and Ansible's implicit fact-gathering task inherits
# that become setting -- so ansible_env reflects root's environment
# (HOME=/root), not the unprivileged connecting user's. lookup() evaluates
# in the controller process's own environment instead (the same
# unprivileged process ansible-playbook itself was invoked from), which is
# correct here since ansible_connection: local makes controller and target
# the same machine.
- name: Clone fulfillment-service
  ansible.builtin.git:
    repo: "{{ fulfillment_service_repo }}"
    dest: "{{ lookup('env', 'HOME') }}/.local/src/fulfillment-service"
    version: "{{ fulfillment_service_branch | default('main', true) }}"
    force: true
  become: false
  # No existence guard: ansible.builtin.git is already idempotent (no-ops
  # if already at the requested ref) and a "only clone if the directory is
  # missing" guard actively breaks re-running this role with a different
  # fulfillment_service_branch on the same box -- it would silently keep
  # whatever was cloned the first time.

- name: Ensure non-root install directory exists
  ansible.builtin.file:
    path: "{{ lookup('env', 'HOME') }}/.local/bin"
    state: directory
    mode: "0755"
  become: false

- name: Build osac CLI
  ansible.builtin.command:
    cmd: /usr/local/go/bin/go build -o "{{ lookup('env', 'HOME') }}/.local/bin/osac" ./cmd/osac
    chdir: "{{ lookup('env', 'HOME') }}/.local/src/fulfillment-service"
  # No creates: guard -- always rebuild so a different fulfillment_service_branch
  # actually takes effect instead of reusing whatever was built first.
  become: false
  environment:
    GOPATH: "{{ lookup('env', 'HOME') }}/go"
    GOCACHE: "{{ lookup('env', 'HOME') }}/.cache/go-build"

- name: Cache snapshot flavor image
  ansible.builtin.include_role:
    name: snapshot_pull
